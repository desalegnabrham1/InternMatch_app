<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="internship_finder">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <style>
    flt-text-editing-host,
    flt-text-editing-host input,
    flt-text-editing-host textarea,
    .flt-text-editing-host,
    .flt-text-editing-host input,
    .flt-text-editing-host textarea,
    .flt-text-editing.transparentTextEditing,
    .flt-text-editing,
    input,
    textarea,
    input:-webkit-autofill,
    textarea:-webkit-autofill {
      color: #1d1d1d !important;
      -webkit-text-fill-color: #1d1d1d !important;
      text-shadow: 0 0 0 #1d1d1d !important;
      caret-color: #0a66c2 !important;
      background-color: transparent !important;
      background-image: none !important;
      width: 100% !important;
      max-width: 100% !important;
      min-width: 2px !important;
      opacity: 1 !important;
      overflow: visible !important;
      display: block !important;
    }

    input:-webkit-autofill,
    textarea:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 1000px transparent inset !important;
      box-shadow: 0 0 0 1000px transparent inset !important;
    }
  </style>

  <script>
    (() => {
      const applyTextFix = (root = document) => {
        const selector = [
          'flt-text-editing-host',
          '.flt-text-editing-host',
          '.flt-text-editing',
          'input',
          'textarea',
        ].join(',');

        root.querySelectorAll(selector).forEach((node) => {
          node.style.setProperty('color', '#1d1d1d', 'important');
          node.style.setProperty('-webkit-text-fill-color', '#1d1d1d', 'important');
          node.style.setProperty('caret-color', '#0a66c2', 'important');
          node.style.setProperty('text-shadow', '0 0 0 #1d1d1d', 'important');
          node.style.setProperty('opacity', '1', 'important');
          node.style.setProperty('background-color', 'transparent', 'important');
          node.style.setProperty('background-image', 'none', 'important');
        });
      };

      const observeNode = (node) => {
        if (!node || !node.querySelectorAll) return;
        applyTextFix(node);
      };

      window.addEventListener('DOMContentLoaded', () => {
        applyTextFix(document);

        const observer = new MutationObserver((mutations) => {
          for (const mutation of mutations) {
            mutation.addedNodes.forEach(observeNode);
          }
        });

        observer.observe(document.documentElement, {
          childList: true,
          subtree: true,
        });
      });
    })();
  </script>

  <title>internship_finder</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
